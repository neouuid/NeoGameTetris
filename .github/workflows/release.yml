name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable
          mkdir -v -p build/windows

      - name: Windows Build
        run: godot --headless --export-release "Windows Desktop" build/windows/NeoTetris.exe

      - name: Zip Artifacts
        run: |
          cd build/windows
          zip -r ../../NeoTetris-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: NeoTetris-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
